name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Internal release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package action
        run: npm run package

      - name: Verify generated dist is current
        run: git diff --exit-code

      - name: Create GitHub release and move v1 tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes
          git tag -f v1 "$TAG"
          git push origin v1 --force
